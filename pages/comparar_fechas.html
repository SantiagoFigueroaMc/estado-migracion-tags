<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparador de Fechas</title>

    <!-- My custom styles -->
    <link rel="stylesheet" href="/styles/styles.css">
    <script src="/scripts/theme.js"></script>
    <script src="/scripts/navigation.js"></script>
</head>

<body>
    <main>

        <h2>Comparador de Fechas</h2>

        <form action="." id="compare-form">

            <div class="grupo">
                <label for="fechaInicio">Fecha de inicio:</label>
                <input type="date" id="fechaInicio">
            </div>
            
            <div class="grupo">
                <label for="fechaFin">Fecha de fin:</label>
                <input type="date" id="fechaFin">
            </div>
            
            <div class="grupo">
                <label for="diasDiferencia">Días de diferencia:</label>
                <input type="number" id="diasDiferencia">
            </div>

            <button type="submit">Guardar</button>
        </form>

        <section id="compare-history"></section>

        <script src="/scripts/comparador_fechas.js"></script>
    </main>

</body>

</html>
